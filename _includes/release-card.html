<div class="item-release">

    <a href="{{ release.url }}">

        <img src="/assets/img/releases/Release-{{ release.img | downcase | replace: ' ', '' }}.png">

        <p class="release-title">
            {{ release.title }}
        </p>

        <p class="release-cat">
            {{ release.cat }}
        </p>

    </a>

</div>
